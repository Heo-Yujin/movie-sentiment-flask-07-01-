<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>영화 감성 분석</title>
</head>
<body>

    <h2>🎬 영화 감성 분석</h2>

    <form action="/predict" method="post">

        <textarea
            name="review"
            rows="6"
            cols="60"
            placeholder="영화 리뷰를 입력하세요."></textarea>

        <br><br>

        <button type="submit">
            감성 분석
        </button>

    </form>

    {% if result %}

        <hr>

        <h3>입력 문장</h3>

        <p>{{ review }}</p>

        <h3>분석 결과</h3>

        <h2>{{ result }}</h2>

    {% endif %}

</body>
</html>
